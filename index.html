<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>The Frog App</title>
    <link rel="stylesheet" href="style.css" />
    <script src="renderer.js" defer></script>
  </head>
  <body>
    <header>
      <h1>🐸 Frog App</h1>
      <button id="close-window">
        <img src="img/close-window.png" alt="close window" />
      </button>
      <div class="animation-container"></div>
    </header>
    <main>
      <div class="input-container">
        <input type="text" id="input-task" placeholder="..." />
        <button class="btn" id="btn-add">
          <img src="img/plus-icon.png" alt="add task" />
        </button>
      </div>
      <div class="list-container">
        <ul id="task-list">
        </ul>
      </div>

            <li>
              <div class="checkbox-container">
                <input type="checkbox" id="${taskId}" />
                <label for="${taskId}" class="label-task">
                  <img src="img/check.png" alt="checked" />
                </label>
              </div>
              <input type="text" class="text-input" hidden maxlength="15" />
              <button class="btn-delete">
                <img src="img/delete-icon.png" alt="delete task" />
              </button>  -->
    </main>
  </body>
</html>

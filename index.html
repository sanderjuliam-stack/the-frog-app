<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>The Frog App</title>
    <link rel="stylesheet" href="style.css" />
    <script src="renderer.js" defer></script>
  </head>
  <body>
    <header>
      <button id="close-window">
        <img src="img/close-window.png" alt="close window" />
      </button>
      <button id="minimize-window">
        <img src="img/minimize-window.png" alt="minimize window" />
      </button>
      <h1>Froggy's to do list</h1>
      <hr />
      <div class="animation-container">
        <div class="sprite principal" id="sprite"></div>
      </div>
    </header>
    <main>
      <div class="add-task-container">
        <input type="text" id="input-task" placeholder="   ..." />
        <button class="btn" id="btn-add">
          <img src="img/plus-icon.png" alt="add task" />
        </button>
      </div>
      <div class="list-container">
        <ul id="task-list"></ul>
      </div>
    </main>
  </body>
</html>
